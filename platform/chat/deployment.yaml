apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  labels:
    app: chat
    app.kubernetes.io/part-of: gpu-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: html
          configMap:
            name: chat-html
        - name: conf
          configMap:
            name: chat-nginx
