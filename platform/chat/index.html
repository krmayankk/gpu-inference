<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gpu-inference · chat</title>
  <style>
    :root { color-scheme: light dark; --bg:#0b0d10; --panel:#14171c; --line:#232830;
            --fg:#e6e9ee; --dim:#8b93a1; --accent:#5aa9ff; --user:#1f6feb22; }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; }
    body { background:var(--bg); color:var(--fg); font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
           display:flex; flex-direction:column; }
    header { padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
    header b { font-weight:600; } header .dim { color:var(--dim); font-size:13px; }
    #log { flex:1; overflow-y:auto; padding:20px 16px; max-width:820px; width:100%; margin:0 auto; }
    .msg { margin:0 0 16px; display:flex; gap:10px; }
    .msg .who { flex:0 0 60px; color:var(--dim); font-size:12px; padding-top:2px; text-transform:uppercase; letter-spacing:.04em; }
    .msg .body { white-space:pre-wrap; word-wrap:break-word; }
    .msg.user .body { background:var(--user); padding:8px 12px; border-radius:8px; }
    footer { border-top:1px solid var(--line); padding:12px 16px; }
    form { display:flex; gap:8px; max-width:820px; margin:0 auto; }
    textarea { flex:1; resize:none; background:var(--panel); color:var(--fg); border:1px solid var(--line);
               border-radius:8px; padding:10px 12px; font:inherit; min-height:44px; max-height:180px; }
    button { background:var(--accent); color:#04121f; border:0; border-radius:8px; padding:0 18px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .cursor::after { content:"▋"; color:var(--dim); animation:blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity:0; } }
  </style>
</head>
<body>
  <header>
    <b>gpu-inference</b>
    <span class="dim" id="model">connecting…</span>
    <span class="dim" style="margin-left:auto">OpenAI-compatible · same manifest, T4→H100</span>
  </header>
  <div id="log"></div>
  <footer>
    <form id="f">
      <textarea id="q" placeholder="Ask something…  (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </footer>

  <script>
    // Same-origin: nginx proxies /v1 -> the `inference` Service. The UI never
    // learns whether the pod behind it is the CPU mock or vLLM on a GPU.
    const API = "/v1";
    const log = document.getElementById("log");
    const form = document.getElementById("f");
    const q = document.getElementById("q");
    const send = document.getElementById("send");
    const history = [];

    fetch(API + "/models").then(r => r.json())
      .then(d => { document.getElementById("model").textContent = "model: " + (d.data?.[0]?.id ?? "unknown"); })
      .catch(() => { document.getElementById("model").textContent = "backend unreachable"; });

    function bubble(who, cls) {
      const el = document.createElement("div");
      el.className = "msg " + cls;
      el.innerHTML = `<div class="who">${who}</div><div class="body"></div>`;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el.querySelector(".body");
    }

    async function ask(text) {
      history.push({ role: "user", content: text });
      bubble("you", "user").textContent = text;
      const out = bubble("model", "bot");
      out.classList.add("cursor");
      send.disabled = true;

      try {
        const res = await fetch(API + "/chat/completions", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ model: "gpu-inference", stream: true, messages: history }),
        });
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let acc = "", buf = "";
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop();
          for (const line of lines) {
            const s = line.trim();
            if (!s.startsWith("data:")) continue;
            const data = s.slice(5).trim();
            if (data === "[DONE]") continue;
            try {
              const j = JSON.parse(data);
              const delta = j.choices?.[0]?.delta?.content || "";
              if (delta) { acc += delta; out.textContent = acc; log.scrollTop = log.scrollHeight; }
            } catch (_) { /* skip keep-alives */ }
          }
        }
        history.push({ role: "assistant", content: acc });
      } catch (e) {
        out.textContent = "⚠ request failed: " + e.message;
      } finally {
        out.classList.remove("cursor");
        send.disabled = false;
        q.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = q.value.trim();
      if (!text) return;
      q.value = "";
      ask(text);
    });
    q.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });
  </script>
</body>
</html>
