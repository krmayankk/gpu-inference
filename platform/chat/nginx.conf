server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz { return 200 "ok\n"; }

  # Proxy the OpenAI API to the invariant `inference` Service. Same-origin, so
  # the browser needs no CORS and one port-forward reaches UI + API.
  location /v1/ {
    proxy_pass http://inference:8000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;        # let SSE tokens stream through unbuffered
    proxy_read_timeout 300s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
