# Sentinel config — what runs on each PR and where. See CLAUDE.md for the
# conventions change_completeness enforces on this repo. Repo-specific
# judgment skills live in .sentinel/skills/ (portability_seam,
# serving_contract, cost_teardown_proof). They are AUTO-DISCOVERED — the
# runner scans .sentinel/skills/*.md (load_custom_skills in sentinel's
# sentinel/skills/custom.py); they need no entry in `skills:` below, always
# run, and are not filtered by routing. Don't take this comment's word for
# it: cross_repo below checks out krmayankk/sentinel into the review's
# search paths, so any skill can grep load_custom_skills in the runner's
# own source and verify.
#
# fail_on is empty on purpose: warn-only until the gate has proven itself on
# real PRs (the onboard principle — nothing blocks merges without a human
# turning it on). Graduation criterion (so this can't drift forever, per the
# gate's own review of PR #1): after 5 reviewed PRs with every critical
# finding triaged as true-positive-or-accepted, flip to [critical].
# Baseline note (2026-07-12): existing profiles audited against the custom
# skills before the gate shipped — all pin served-model-name; h100 TP=8
# matches its nvidia.com/gpu:8; h100's missing pool row is the documented
# Phase-5 placeholder, not a latent violation.
skills:
  # cross_repo: the gate's own runner is part of this repo's trusted surface —
  # checking it out lets reviews verify claims about sentinel's behavior
  # (e.g. custom-skill auto-discovery) against its source instead of
  # speculating. The checkout lands on the shared context, so every skill in
  # the run (custom ones included) can search it.
  - change_completeness:
      cross_repo:
        - krmayankk/sentinel
  - workflow_security

fail_on: []

routing:
  - pattern: ".github/workflows/**"
    skills: [workflow_security]
  - pattern: "infra/**"
    skills: [change_completeness]
  - pattern: "platform/**"
    skills: [change_completeness]
  - pattern: "platform/serving/gpus/**"
    skills: [change_completeness]
